name: PR Queue Grooming Agent — Nightly

# Processes all open PRs: closes superseded ones, merges clean ones in
# dependency order, rebases and resolves conflicts for dirty ones.
# Prompt lives in .agents/pr-merge.md.

on:
  schedule:
    # 3 AM UTC — implementation agent runs at midnight, CI finishes ~12:15 AM,
    # so the queue is stable by this time.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-merge-agent
  cancel-in-progress: false

jobs:
  pr-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Run PR queue grooming session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY:          ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN:                ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes @anthropic-ai/claude-code --print \
            --permission-mode bypassPermissions \
            "$(cat .agents/pr-merge.md)"
