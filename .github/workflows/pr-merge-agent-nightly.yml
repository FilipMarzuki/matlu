name: DevCycle 5 — Grooming

# End-of-night sweep: closes superseded PRs, rebases dirty ones, merges
# anything the per-PR pipeline missed. Runs once at 06:00 UTC (after the
# DevCycle loop has had ~4 hours to process issues). Also available manually.
# Prompt lives in .agents/pr-merge.md.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-merge-agent
  cancel-in-progress: false

jobs:
  pr-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Run PR queue grooming session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_PERSONAL }}
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN:                ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes @anthropic-ai/claude-code --print \
            --permission-mode bypassPermissions \
            "$(cat .agents/pr-merge.md)"
