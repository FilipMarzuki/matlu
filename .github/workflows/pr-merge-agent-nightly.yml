name: PR Grooming

# Processes all open PRs: closes superseded ones, merges clean ones in
# dependency order, rebases and resolves conflicts for dirty ones.
# Prompt lives in .agents/pr-merge.md.
#
# Chain: fires via workflow_run when the Dev Agent completes, so the order
# each night is: refinement (22:00) → cleanup (~22:15) → dev agent (02:00) → grooming (~02:30).
# The grooming agent checks CI status before merging, so it handles the case
# where CI is still running on freshly-created PRs.

on:
  workflow_run:
    workflows: ["Dev Agent"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-merge-agent
  cancel-in-progress: false

jobs:
  pr-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Run PR queue grooming session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN:                ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes @anthropic-ai/claude-code --print \
            --permission-mode bypassPermissions \
            "$(cat .agents/pr-merge.md)"
