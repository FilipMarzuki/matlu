name: Refinement 2 — Hygiene

# Per-issue cleanup runner. Fires after every Refinement 1 — Triage run and cleans
# up three drift patterns in the Linear backlog:
#
#   mark-done  — In Progress issues whose PR is merged → move to Done
#   split      — Issues labelled `too-large` → break into 2–4 sub-issues
#   enrich     — Issues labelled `needs-refinement` → add codebase context
#
# One isolated Claude Code session per issue (same pattern as the triage
# and nightly implementation agents). A failure on one issue does not
# block the others.
#
# Chain: fires via workflow_run when Refinement 1 — Triage completes. After
# cleanup, re-triggers Refinement 1 — Triage so newly-split sub-issues get
# triaged the same night they're created. Capped at MAX_REFINEMENT_RUNS=3
# total per 6-hour window to prevent runaway loops — each cycle is ~30 min
# so 3 runs still finishes well before the 02:00 UTC Dev Agent.
#
# Full nightly order: refinement (22:00) → cleanup → refinement → cleanup
#                     → refinement (if needed) → cleanup → dev agent (02:00)
#
# Manual: trigger from the Actions tab. Optionally pin to a single issue
# with the `issue` input (e.g. "FIL-42:mark-done").

on:
  workflow_run:
    workflows: ["Refinement 1 — Triage"]
    types: [completed]
  workflow_dispatch:
    inputs:
      issue:
        description: 'Single issue override, e.g. "FIL-42:mark-done". Leave blank to scan all.'
        required: false
        type: string

concurrency:
  group: agent-hygiene
  cancel-in-progress: false

jobs:
  fetch-issues:
    runs-on: ubuntu-latest
    outputs:
      issues:     ${{ steps.fetch.outputs.issues }}
      has_issues: ${{ steps.fetch.outputs.has_issues }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'

      - name: Fetch hygiene tasks
        id: fetch
        run: |
          if [ -n "${{ inputs.issue }}" ]; then
            node .github/scripts/fetch-hygiene-issues.js --issue "${{ inputs.issue }}"
          else
            node .github/scripts/fetch-hygiene-issues.js
          fi

  run-hygiene:
    needs: fetch-issues
    if: needs.fetch-issues.outputs.has_issues == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        issue: ${{ fromJson(needs.fetch-issues.outputs.issues) }}
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ci-placeholder-not-a-real-key
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so mark-done can run git log checks

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'

      - name: Run hygiene session for ${{ matrix.issue }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_PERSONAL }}
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/run-hygiene.js "${{ matrix.issue }}"

  chain-refinement:
    needs: [fetch-issues, run-hygiene]
    # Run even if some hygiene tasks failed or there were no issues — a split
    # may have created new sub-issues that need triage regardless.
    if: always() && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Re-trigger Refinement 1 — Triage (max 3 runs per 6-hour window)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAX_RUNS=3
          CUTOFF=$(date -u -d '6 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          RECENT=$(gh api "repos/${{ github.repository }}/actions/workflows/agent-triage.yml/runs" \
            --jq "[.workflow_runs[] | select(.created_at > \"$CUTOFF\")] | length")
          echo "Refinement 1 — Triage runs in last 6 hours: $RECENT (max: $MAX_RUNS)"
          if [ "$RECENT" -lt "$MAX_RUNS" ]; then
            echo "Dispatching Refinement 1 — Triage (cycle $((RECENT + 1)) of $MAX_RUNS)"
            gh workflow run agent-triage.yml --repo ${{ github.repository }}
          else
            echo "Cap reached — stopping refinement chain for this cycle"
          fi

      - name: Log token usage
        if: always()
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/log-session-tokens.js --workflow "Refinement 2 — Hygiene"
      # [token-logging-added]
