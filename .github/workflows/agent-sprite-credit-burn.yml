name: Sprite Credit Burn

# Uses remaining PixelLab credits to generate pixel art sprites for entities missing them.
# Trigger manually from the Actions tab when you're ready to spend credits.
#
# Safe to re-run: skips entities already done (status: "done" in asset-spec.json) and
# stops cleanly when PixelLab returns an error (= credits exhausted). Commits after every
# single entity so partial runs never lose progress.
#
# Priority: spinolandet enemies → earth enemies → spinolandet heroes → earth heroes → summons
#
# Tip: run entity-spec-fill manually first so designNotes.sprite is populated before this runs.

on:
  workflow_dispatch:

concurrency:
  group: agent-sprite-credit-burn
  cancel-in-progress: false   # never interrupt a run mid-entity

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120       # 2 hours — enough for ~6 entities with animations
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ci-placeholder-not-a-real-key
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name  "sprite-credit-burn[bot]"
          git config user.email "sprite-credit-burn@matlu.dev"

      - name: Run sprite credit-burn session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_PERSONAL }}
          
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          PIXELLAB_API_KEY:        ${{ secrets.PIXELLAB_API_KEY }}
        run: |
          npx --yes @anthropic-ai/claude-code --print \
            --permission-mode bypassPermissions \
            "$(cat .agents/sprite-credit-burn.md)"

      - name: Log token usage
        if: always()
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/log-session-tokens.js --workflow "Sprite Credit Burn"
      # [token-logging-added]
