name: Cognitive Load Snapshot

# Computes weekly developer cognitive load (open PRs, avg PR age, issues in
# progress, rework rate) and writes one row to Supabase cognitive_load.
# Runs every Saturday so the snapshot is ready before the weekly release notes.
# Prompt lives in .agents/cognitive-load-snapshot.md.

on:
  schedule:
    # 08:30 UTC every Saturday (after the learning summary at 07:00).
    - cron: '30 8 * * 6'
  workflow_dispatch:

concurrency:
  group: agent-cognitive-load-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history needed for git log rework-rate computation

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'

      - name: Run cognitive load snapshot
        env:
          CLAUDE_CODE_OAUTH_TOKEN:   ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY:            ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN:                  ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npx --yes @anthropic-ai/claude-code --print \
            --permission-mode bypassPermissions \
            "$(cat .agents/cognitive-load-snapshot.md)"
