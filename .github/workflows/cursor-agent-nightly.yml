name: DevCycle 1 — Dev Agent (Marvin)

# Single-issue Cursor agent runner. Same loop pattern as Bender (Claude)
# but uses the Cursor CLI. Picks the highest-priority ready issue, implements
# it, opens a PR with a marvin/ branch prefix.
#
# The PR flows through the shared pipeline: CI → Review → Merge.
# After merge, this workflow is re-triggered for the next issue.
#
# Required repo secret: GH_TRACKER_TOKEN — a GitHub PAT with `contents:write`,
# `pull-requests:write`, and `workflows:write` scopes. Pushes and PR opens
# must use a PAT (not the built-in GITHUB_TOKEN), because GitHub suppresses
# `push` / `pull_request` triggers when actions create them with GITHUB_TOKEN.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_run:
    workflows: ["DevCycle 4 — Merge", "DevCycle 5 — Grooming"]
    types: [completed]
  workflow_dispatch:
    inputs:
      issue_id:
        description: 'GitHub issue number to run (e.g. 42). Leave blank to pick the top priority.'
        required: false
        type: string

concurrency:
  group: agent-marvin
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Heartbeat
        run: echo "Marvin cycle started at $(date -u) — event=${{ github.event_name }}"

      - name: Check origin (always pass — fetch-issue decides eligibility)
        id: check-origin
        run: |
          # DevCycle 4 — Merge fires workflow_run with head_branch=main due to
          # chained workflow_run context loss (the original PR's branch is not
          # propagated through CI → Review → Merge). The previous marvin/*
          # check therefore always rejected DevCycle 4 events, breaking the
          # post-merge wake chain.
          #
          # Letting fetch-issue decide is correct: if no eligible work exists
          # it exits cleanly. Cron + workflow_dispatch + workflow_run all flow
          # through the same path now.
          echo "is_marvin=true" >> $GITHUB_OUTPUT

      - name: Check cycle cap
        id: check
        if: steps.check-origin.outputs.is_marvin == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAX_RUNS=10
          CUTOFF=$(date -u -d '8 hours ago' +%Y-%m-%dT%H:%M:%SZ)

          # Count only runs where the run-agent job actually executed (i.e.,
          # consumed Cursor budget). Runs that exited at gate or fetch level
          # have run-agent.conclusion == "skipped" and don't count toward the
          # cap, since they didn't burn budget. See #671 for the rationale.
          RUN_IDS=$(gh api "repos/${{ github.repository }}/actions/workflows/cursor-agent-nightly.yml/runs?per_page=100" \
            --jq "[.workflow_runs[] | select(.created_at > \"$CUTOFF\") | .id] | .[]")
          RECENT=0
          for RUN_ID in $RUN_IDS; do
            HAS_JOB=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
              --jq '[.jobs[] | select(.name == "run-agent" and .conclusion != "skipped")] | length' \
              2>/dev/null || echo 0)
            if [ "$HAS_JOB" -gt 0 ]; then
              RECENT=$((RECENT + 1))
            fi
          done

          echo "Marvin substantive runs in last 8 hours: $RECENT (max: $MAX_RUNS)"
          if [ "$RECENT" -lt "$MAX_RUNS" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Cycle cap reached — stopping Marvin for this night"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  fetch-issue:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      issue:     ${{ steps.first.outputs.issue }}
      has_issue: ${{ steps.first.outputs.has_issue }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'

      - name: Fetch top-priority issue
        id: pick
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.issue_id }}" ]; then
            node .github/scripts/fetch-agent-issues.js --issue "${{ inputs.issue_id }}"
          else
            node .github/scripts/fetch-agent-issues.js
          fi

      - name: Pick first issue
        id: first
        run: |
          ISSUES='${{ steps.pick.outputs.issues }}'
          FIRST=$(echo "$ISSUES" | node -e "
            const d = require('fs').readFileSync(0,'utf8').trim();
            const arr = JSON.parse(d);
            if (arr.length > 0) {
              console.log(arr[0]);
            }
          ")
          if [ -n "$FIRST" ]; then
            echo "issue=$FIRST" >> $GITHUB_OUTPUT
            echo "has_issue=true" >> $GITHUB_OUTPUT
            echo "Picked issue #$FIRST"
          else
            echo "has_issue=false" >> $GITHUB_OUTPUT
            echo "No eligible issues found"
          fi

  run-agent:
    needs: fetch-issue
    if: needs.fetch-issue.outputs.has_issue == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      exit_code: ${{ steps.cursor_session.outputs.exit_code }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ci-placeholder-not-a-real-key
    steps:
      - uses: actions/checkout@v6
        with:
          # PAT so the push of marvin/<branch> fires DevCycle 2 — CI.
          token: ${{ secrets.GH_TRACKER_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Cursor CLI
        # Installs the `cursor-agent` binary to ~/.local/bin. We append that
        # directory to GITHUB_PATH so subsequent steps find it.
        run: |
          curl -fsSL https://cursor.com/install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Cursor CLI
        # Fail fast if install broke or PATH didn't take. Also prints the
        # version into the run log so drift in the CLI is visible later.
        run: |
          which cursor-agent
          cursor-agent --version

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Cursor session for issue #${{ needs.fetch-issue.outputs.issue }}
        id: cursor_session
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          # GH_TRACKER_TOKEN (PAT) so the PR Marvin opens triggers DevCycle 2 — CI.
          GITHUB_TOKEN:   ${{ secrets.GH_TRACKER_TOKEN }}
          GH_TOKEN:       ${{ secrets.GH_TRACKER_TOKEN }}
        run: |
          node .github/scripts/run-agent-marvin.js "${{ needs.fetch-issue.outputs.issue }}"
          ec=$?
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          exit $ec

      - name: Clean up stale in-progress label on failure
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.fetch-issue.outputs.issue }}"
          echo "Non-success exit — cleaning up labels on #$ISSUE"
          gh api -X DELETE "repos/${{ github.repository }}/issues/$ISSUE/labels/agent:in-progress" || true
          gh api -X POST "repos/${{ github.repository }}/issues/$ISSUE/labels" \
            -f 'labels[]=agent:failed' || true

      - name: Reconcile labels on success
        # Remove residual bookkeeping labels after a successful run. Leaves
        # whatever outcome label Cursor applied (agent:success, agent:partial,
        # etc.) so only one status label remains on the issue.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.fetch-issue.outputs.issue }}"
          echo "Success exit — reconciling bookkeeping labels on #$ISSUE"
          gh api -X DELETE "repos/${{ github.repository }}/issues/$ISSUE/labels/agent:in-progress" || true
          gh api -X DELETE "repos/${{ github.repository }}/issues/$ISSUE/labels/agent:failed" || true

      - name: Swap mislabelled agent:already-shipped → agent:success
        # Step 0 of .agents/per-issue-marvin.md is the only legitimate place
        # for agent:already-shipped (supersession exit, no PR opened). If the
        # session reached Step 3 and opened a PR, the model sometimes
        # mis-applies already-shipped instead of agent:success — see #658.
        # This guard catches that and swaps the label so weekly stats and
        # human readers see the correct outcome.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.fetch-issue.outputs.issue }}"
          HAS_LABEL=$(gh issue view "$ISSUE" --repo "${{ github.repository }}" --json labels \
            --jq '[.labels[] | select(.name == "agent:already-shipped")] | length')
          if [ "$HAS_LABEL" -eq 0 ]; then
            echo "No agent:already-shipped on #$ISSUE — nothing to reconcile."
            exit 0
          fi
          HAS_PR=$(gh pr list --repo "${{ github.repository }}" --state all \
            --search "#$ISSUE in:body" --json number --jq 'length')
          if [ "$HAS_PR" -gt 0 ]; then
            echo "Mislabel: agent:already-shipped on #$ISSUE but PR exists → swap to agent:success"
            gh api -X DELETE "repos/${{ github.repository }}/issues/$ISSUE/labels/agent:already-shipped" || true
            gh api -X POST "repos/${{ github.repository }}/issues/$ISSUE/labels" -f 'labels[]=agent:success' || true
          else
            echo "agent:already-shipped on #$ISSUE with no PR — legitimate Step 0 exit, leaving as-is."
          fi

      - name: Log token usage
        if: always()
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/log-session-tokens.js --workflow "DevCycle 1 — Dev Agent (Marvin)" --issue "${{ needs.fetch-issue.outputs.issue }}"

  workflow-summary:
    name: Marvin cycle summary
    needs: [gate, fetch-issue, run-agent]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Write run outcome summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          GATE_RESULT: ${{ needs.gate.result }}
          SHOULD_RUN: ${{ needs.gate.outputs.should_run }}
          FETCH_RESULT: ${{ needs.fetch-issue.result }}
          HAS_ISSUE: ${{ needs.fetch-issue.outputs.has_issue }}
          ISSUE: ${{ needs.fetch-issue.outputs.issue }}
          AGENT_RESULT: ${{ needs.run-agent.result }}
          EXIT_CODE: ${{ needs.run-agent.outputs.exit_code }}
        run: |
          {
            echo '## Marvin cycle outcome'
            echo ''
            if [ "$GATE_RESULT" != 'success' ]; then
              echo "Gate job result: \`$GATE_RESULT\` — Marvin did not complete a normal cycle (check earlier jobs)."
            elif [ "$SHOULD_RUN" != 'true' ]; then
              echo '**Idle (gate):** Cycle cap reached — \`should_run=false\`. No issue fetch or agent run this cycle.'
            elif [ "$FETCH_RESULT" = 'failure' ]; then
              echo '**Failure:** Issue fetch job failed before an issue could be picked.'
            elif [ "$HAS_ISSUE" != 'true' ]; then
              echo '**Idle:** No eligible issues found.'
            elif [ "$AGENT_RESULT" = 'skipped' ]; then
              echo "**Unexpected:** Issue #$ISSUE was picked but run-agent did not run (skipped)."
            elif [ "$AGENT_RESULT" = 'success' ]; then
              PR_NUM=$(gh pr list --repo "$REPO" --state all --limit 40 \
                --json number,headRefName,body \
                --jq ".[] | select(.headRefName | startswith(\"marvin/\")) | select(.body | contains(\"#${ISSUE}\")) | .number" \
                | head -1 || true)
              PR_NUM=${PR_NUM:-}
              LABELS=$(gh issue view "$ISSUE" --repo "$REPO" --json labels \
                --jq '[.labels[].name] | map(select(startswith("agent:"))) | join(", ")' 2>/dev/null || echo '')
              LABELS=${LABELS:-'(none detected)'}
              if [ -n "$PR_NUM" ]; then
                echo "**Success:** Picked issue #$ISSUE, opened PR #$PR_NUM, agent labels: $LABELS"
              else
                echo "**Success (verify):** Picked issue #$ISSUE, run-agent succeeded but no \`marvin/*\` PR referencing #$ISSUE was found in recent PRs. Agent labels: $LABELS"
              fi
            else
              PR_NUM=$(gh pr list --repo "$REPO" --state all --limit 40 \
                --json number,headRefName,body \
                --jq ".[] | select(.headRefName | startswith(\"marvin/\")) | select(.body | contains(\"#${ISSUE}\")) | .number" \
                | head -1 || true)
              PR_NUM=${PR_NUM:-}
              EC=${EXIT_CODE:-unknown}
              if [ -n "$PR_NUM" ]; then
                echo "**Partial / failed:** Picked issue #$ISSUE, run-agent result: \`$AGENT_RESULT\`, PR #$PR_NUM exists, cursor exit code: $EC"
              else
                echo "**Failure:** Picked issue #$ISSUE, no PR opened, cursor exit code: $EC (run-agent: \`$AGENT_RESULT\`)"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
