name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

# Cancel any in-progress run for the same branch so stale agent commits
# don't pile up. Main branch keeps all runs (fail-fast for release branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Placeholder values so Vite can bundle without repo secrets. Override in deploy (e.g. Vercel env vars).
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ci-placeholder-not-a-real-key
      # Better Stack token — omitted in CI so logger falls back to console.
      # VITE_BETTERSTACK_DSN is set in Vercel shared variables for production.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test
