name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Placeholder values so Vite can bundle without repo secrets. Override in deploy (e.g. Vercel env vars).
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ci-placeholder-not-a-real-key
      # Better Stack token — omitted in CI so logger falls back to console.
      # VITE_BETTERSTACK_DSN is set in Vercel shared variables for production.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test

  build-wiki:
    name: Build Matlu Codex (wiki/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wiki
    env:
      # Placeholder env vars — wiki build must not crash on missing secrets
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ci-placeholder
      NOTION_API_KEY: ci-placeholder
      # Server-side vars for admin routes — only needed at runtime, not build time.
      # Placeholder values here satisfy any compile-time checks.
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role
      ADMIN_PASSWORD: ci-placeholder-admin
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build

  build-dev:
    name: Build Agentic Experiments (dev/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dev
    env:
      # Placeholder env vars — dev build must not crash on missing secrets
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ci-placeholder
      NOTION_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build
