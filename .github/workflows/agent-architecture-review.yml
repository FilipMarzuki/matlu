name: Weekly Architecture Review

# Reviews the week's code changes and updates ARCHITECTURE.md with current
# state + concerns. Runs every Friday — prompt lives in
# .agents/architecture-review.md.

on:
  schedule:
    # 17:00 UTC (7:00 PM GMT+2) every Friday.
    - cron: '0 17 * * 5'
  workflow_dispatch:

concurrency:
  group: agent-architecture-review
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # agent commits updated ARCHITECTURE.md
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so git log --since works

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run architecture review session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY:          ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes @anthropic-ai/claude-code --print \
            --permission-mode bypassPermissions \
            "$(cat .agents/architecture-review.md)"

      - name: Log token usage
        if: always()
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/log-session-tokens.js --workflow "Weekly Architecture Review"
      # [token-logging-added]
