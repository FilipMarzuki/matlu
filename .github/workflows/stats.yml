name: Weekly Engineering Stats

on:
  schedule:
    - cron: '0 8 * * 0'   # Every Sunday at 08:00 UTC
  workflow_dispatch:        # Also runnable manually from GitHub Actions UI

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --save-dev @octokit/rest @linear/sdk @notionhq/client

      - name: Collect and post stats
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_KEY:      ${{ secrets.LINEAR_API_KEY }}
          NOTION_API_KEY:      ${{ secrets.NOTION_API_KEY }}
          NOTION_STATS_PAGE:   33f379d6-d7c6-816e-a1cb-df23d81a5bd6
          GITHUB_REPO_OWNER:   FilipMarzuki
          GITHUB_REPO_NAME:    matlu
        run: node .github/scripts/collect-stats.mjs

      - name: Trigger Vercel rebuild
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK"
          fi
