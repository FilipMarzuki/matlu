name: Submission to Entity

# Manual trigger only — sprite generation costs real credits and needs human approval
# mid-run for the PixelLab preview step.
on:
  workflow_dispatch:
    inputs:
      submission_id:
        description: 'creature_submissions UUID (leave blank to pick oldest approved+unconverted)'
        required: false
        default: ''

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # PixelLab generation + polling can take 30–60 min

    env:
      SUBMISSION_ID:            ${{ inputs.submission_id }}
      SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
      PIXELLAB_API_KEY:         ${{ secrets.PIXELLAB_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN:  ${{ secrets.CLAUDE_CODE_PERSONAL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run submission-to-entity agent
        run: |
          npx claude \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,mcp__supabase__execute_sql,mcp__supabase__apply_migration,mcp__pixellab__create_character,mcp__pixellab__get_character,mcp__pixellab__animate_character,mcp__pixellab__delete_character,mcp__linear__save_issue,mcp__linear__list_teams,mcp__linear__list_issue_statuses,mcp__linear__list_issue_labels,mcp__notion__notion-create-pages,mcp__notion__notion-search,mcp__github-mcp__create_pull_request,mcp__github-mcp__create_branch" \
            --print \
            --max-turns 120 \
            -p "$(cat .agents/submission-to-entity.md)"
