name: Submission to Entity

# Converts a submitted creature submission into a full entity spec:
# lore, balanced stats, behavior model, design notes, asset spec,
# Notion lore page, and GitHub issue. Does NOT generate sprites.
#
# Trigger: Supabase Database Webhook on creature_submissions INSERT → Edge Function
# `supabase/functions/trigger-entity-pipeline` → GitHub API workflow_dispatch.
# Edge Function secret: GH_TRACKER_TOKEN. Webhook: Authorization Bearer <service_role>.
# Manual workflow_dispatch remains for retries. See CLAUDE.md (Submission to Entity) for setup.
on:
  workflow_dispatch:
    inputs:
      submission_id:
        description: 'creature_submissions UUID (leave blank to pick oldest submitted+unconverted)'
        required: false
        default: ''

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUBMISSION_ID:            ${{ inputs.submission_id }}
      SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN:  ${{ secrets.CLAUDE_CODE_PERSONAL }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run submission-to-entity agent
        run: |
          npx claude \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,mcp__supabase__execute_sql,mcp__supabase__apply_migration,mcp__supabase__generate_typescript_types,mcp__github-mcp__create_issue,mcp__github-mcp__add_issue_comment,mcp__github-mcp__get_issue,mcp__notion__notion-create-pages,mcp__notion__notion-search,mcp__notion__notion-fetch" \
            --print \
            --max-turns 80 \
            -p "$(cat .agents/submission-to-entity.md)"
