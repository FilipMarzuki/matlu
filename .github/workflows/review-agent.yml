name: DevCycle 3 — Review

# Per-PR review agent. Fires when CI passes on a PR, reviews the diff,
# and either approves or requests changes. DevCycle 4 — Merge chains
# off this workflow and only merges approved PRs.

on:
  workflow_run:
    workflows: ["DevCycle 2 — CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (e.g. 123). Leave blank to skip.'
        required: false
        type: string

concurrency:
  group: review-${{ github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # Only run when CI passed on a pull_request event (not direct pushes to main)
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'pull_request')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ci-placeholder-not-a-real-key
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'

      - name: Find PR number
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            PR_NUMBER=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
              --jq '.[0].number // empty')
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no PR found
        if: steps.find-pr.outputs.pr_number == ''
        run: echo "No PR found for this commit — skipping review."

      - name: Check if PR is draft
        if: steps.find-pr.outputs.pr_number != ''
        id: check-draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_DRAFT=$(gh pr view ${{ steps.find-pr.outputs.pr_number }} --json isDraft --jq '.isDraft')
          echo "is_draft=$IS_DRAFT" >> $GITHUB_OUTPUT

      - name: Run review agent
        if: steps.find-pr.outputs.pr_number != '' && steps.check-draft.outputs.is_draft != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_PERSONAL }}
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN:                ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ steps.find-pr.outputs.pr_number }}
          PROMPT=$(cat .agents/review.md | sed "s/{{pr_number}}/$PR_NUMBER/g")
          npx --yes @anthropic-ai/claude-code --print \
            --permission-mode bypassPermissions \
            "$PROMPT"
