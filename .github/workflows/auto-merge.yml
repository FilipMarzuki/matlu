name: DevCycle 4 — Merge

# Squash-merges a PR after the Review agent completes — but only if the
# PR has been approved. This ensures every merge goes through CI + Review.
on:
  workflow_run:
    workflows: ["DevCycle 3 — Review"]
    types: [completed]

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Find PR for this commit
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
            --jq '.[0].number // empty')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Check for approval
        if: steps.find-pr.outputs.pr_number != ''
        id: check-approval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPROVED=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ steps.find-pr.outputs.pr_number }}/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')
          echo "approved=$APPROVED" >> $GITHUB_OUTPUT
          if [ "$APPROVED" -gt 0 ]; then
            echo "PR #${{ steps.find-pr.outputs.pr_number }} is approved"
          else
            echo "PR #${{ steps.find-pr.outputs.pr_number }} is NOT approved — skipping merge"
          fi

      - name: Squash-merge PR
        if: steps.find-pr.outputs.pr_number != '' && steps.check-approval.outputs.approved > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Merging PR #${{ steps.find-pr.outputs.pr_number }}"
          gh pr merge ${{ steps.find-pr.outputs.pr_number }} \
            --squash \
            --delete-branch \
            --repo ${{ github.repository }}
