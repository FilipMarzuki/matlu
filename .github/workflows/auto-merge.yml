name: DevCycle 4 — Merge

# Squash-merges a PR after the Review agent completes — but only if the
# PR has been approved. This ensures every merge goes through CI + Review.
on:
  workflow_run:
    workflows: ["DevCycle 3 — Review"]
    types: [completed]

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write
      contents: write
    steps:
      # Download the PR number from the Review artifact instead of looking
      # it up by commit SHA — workflow_run chains lose the original head_sha
      # (we'd see main's HEAD, not the PR branch tip).
      - name: Download PR number from Review
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download the review-result artifact from the triggering Review run
          RUN_ID=${{ github.event.workflow_run.id }}
          ARTIFACT_URL=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name == "review-result") | .archive_download_url' 2>/dev/null || true)

          if [ -n "$ARTIFACT_URL" ]; then
            gh api "$ARTIFACT_URL" > /tmp/artifact.zip
            unzip -o /tmp/artifact.zip -d /tmp/review-result
            PR_NUMBER=$(cat /tmp/review-result/pr_number)
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "Found PR #$PR_NUMBER from Review artifact"
          else
            echo "No review-result artifact found — Review may have skipped"
          fi

      - name: Check for approval
        if: steps.find-pr.outputs.pr_number != ''
        id: check-approval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPROVED=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ steps.find-pr.outputs.pr_number }}/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')
          echo "approved=$APPROVED" >> $GITHUB_OUTPUT
          if [ "$APPROVED" -gt 0 ]; then
            echo "PR #${{ steps.find-pr.outputs.pr_number }} is approved"
          else
            echo "PR #${{ steps.find-pr.outputs.pr_number }} is NOT approved — skipping merge"
          fi

      - name: Squash-merge PR
        if: steps.find-pr.outputs.pr_number != '' && steps.check-approval.outputs.approved > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Merging PR #${{ steps.find-pr.outputs.pr_number }}"
          gh pr merge ${{ steps.find-pr.outputs.pr_number }} \
            --squash \
            --delete-branch \
            --repo ${{ github.repository }}
