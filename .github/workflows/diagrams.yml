name: Architecture Diagrams

# Scans the codebase, generates Mermaid architecture diagrams, renders to PNG,
# pushes PNGs to the public matlu-wiki repo, and updates the Notion dev blog.
# Runs every Monday — script lives in .github/scripts/generate-diagrams.js.

on:
  schedule:
    # 06:00 UTC every Monday (1 hour before roadmap-update at 07:00).
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: diagrams
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run diagram generator
        env:
          NOTION_API_KEY:          ${{ secrets.NOTION_API_KEY }}
          MATLU_WIKI_PUSH_TOKEN:   ${{ secrets.MATLU_WIKI_PUSH_TOKEN }}
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/generate-diagrams.js
