name: Agent Performance Log

# Chains after Weekly Release Notes to form the Sunday stats pipeline:
#   Weekly Engineering Stats → Weekly Release Notes → Agent Performance Log
# Queries Linear for the past week's agent outcome labels, computes a breakdown
# by issue type, and appends a weekly summary child page to the Notion
# "Agent Performance Log". Prompt lives in .agents/agent-perf-log.md.

on:
  workflow_run:
    workflows: ["Weekly Release Notes"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: agent-perf-log
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # agent may commit token log
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run agent performance log session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY:          ${{ secrets.LINEAR_API_KEY }}
          NOTION_API_KEY:          ${{ secrets.NOTION_API_KEY }}
        run: |
          npx --yes @anthropic-ai/claude-code --print \
            --permission-mode bypassPermissions \
            "$(cat .agents/agent-perf-log.md)"
