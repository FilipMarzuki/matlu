name: Weekly Agent Dispatch

# Researches agentic development topics and writes a weekly briefing
# to a Notion "Weekly Dispatch" database. Prompt: .agents/weekly-dispatch.md.
# Runs Saturdays at 09:00 UTC — after the Learning Summary (07:00 UTC).

on:
  schedule:
    - cron: '0 9 * * 6'
  workflow_dispatch:

concurrency:
  group: agent-weekly-dispatch
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run weekly dispatch session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY:          ${{ secrets.NOTION_API_KEY }}
          VERCEL_DEPLOY_HOOK:      ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          npx --yes @anthropic-ai/claude-code --print \
            --permission-mode bypassPermissions \
            "$(cat .agents/weekly-dispatch.md)"

      - name: Log token usage
        if: always()
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/log-session-tokens.js --workflow "Weekly Agent Dispatch"
      # [token-logging-added]
