name: DevCycle 1 — Dev Agent (Bender)

# Single-issue runner. Picks the highest-priority ready issue, implements it,
# and opens a PR. The PR then flows through the DevCycle pipeline:
#   CI → Review → Merge → (re-trigger Dev Agent for the next issue)
#
# One issue at a time ensures each PR merges cleanly before the next one
# starts — no conflicts, no wasted work.
#
# The loop is capped at MAX_DEVCYCLE_RUNS per 8-hour window to prevent
# runaway spending. Each cycle is ~15–30 min so 10 runs finishes well
# within one night.
#
# Required repo secret: GH_TRACKER_TOKEN — a GitHub PAT (fine-grained or
# classic) with `contents:write`, `pull-requests:write`, and `workflows:write`
# scopes. Pushes and PR opens must use a PAT (not the built-in GITHUB_TOKEN),
# because GitHub suppresses `push` / `pull_request` triggers when actions
# create them with GITHUB_TOKEN — that would stop DevCycle 2 — CI from firing
# on the PR.

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_run:
    # Both Merge and Grooming can land a Bender PR on main — the loop has to
    # wake up for either. Listening only to DevCycle 4 stalled the loop
    # overnight when DevCycle 5 force-merged #582.
    workflows: ["DevCycle 4 — Merge", "DevCycle 5 — Grooming"]
    types: [completed]
  workflow_dispatch:
    inputs:
      issue_id:
        description: 'GitHub issue number to run (e.g. 42). Leave blank to pick the top priority.'
        required: false
        type: string

concurrency:
  group: agent-nightly
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if this was triggered by a Bender branch
        id: check-origin
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            WORKFLOW="${{ github.event.workflow_run.name }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            # DevCycle 5 — Grooming runs on main and doesn't expose which
            # branch it merged, so let fetch-issue decide whether there's
            # eligible work. DevCycle 4 — Merge does run on the PR's head
            # branch, so we keep the bender/* guard for it to avoid Bender
            # waking up every time a Marvin PR merges.
            if [ "$WORKFLOW" = "DevCycle 5 — Grooming" ]; then
              echo "is_bender=true" >> $GITHUB_OUTPUT
            elif [[ "$BRANCH" != bender/* ]]; then
              echo "Merge was for branch '$BRANCH' — not a Bender PR, skipping"
              echo "is_bender=false" >> $GITHUB_OUTPUT
            else
              echo "is_bender=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "is_bender=true" >> $GITHUB_OUTPUT
          fi

      - name: Check cycle cap
        id: check
        if: steps.check-origin.outputs.is_bender == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAX_RUNS=10
          CUTOFF=$(date -u -d '8 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          RECENT=$(gh api "repos/${{ github.repository }}/actions/workflows/agent-nightly.yml/runs" \
            --jq "[.workflow_runs[] | select(.created_at > \"$CUTOFF\")] | length")
          echo "Bender runs in last 8 hours: $RECENT (max: $MAX_RUNS)"
          if [ "$RECENT" -lt "$MAX_RUNS" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Cycle cap reached — stopping Bender for this night"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  fetch-issue:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      issue:     ${{ steps.first.outputs.issue }}
      has_issue: ${{ steps.first.outputs.has_issue }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'

      - name: Fetch top-priority issue
        id: pick
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.issue_id }}" ]; then
            node .github/scripts/fetch-agent-issues.js --issue "${{ inputs.issue_id }}"
          else
            node .github/scripts/fetch-agent-issues.js
          fi
          # fetch-agent-issues.js writes issues=[...] to GITHUB_OUTPUT.
          # We only want the first one.

      - name: Pick first issue
        id: first
        run: |
          ISSUES='${{ steps.pick.outputs.issues }}'
          FIRST=$(echo "$ISSUES" | node -e "
            const d = require('fs').readFileSync(0,'utf8').trim();
            const arr = JSON.parse(d);
            if (arr.length > 0) {
              console.log(arr[0]);
              process.exitCode = 0;
            } else {
              process.exitCode = 0;
            }
          ")
          if [ -n "$FIRST" ]; then
            echo "issue=$FIRST" >> $GITHUB_OUTPUT
            echo "has_issue=true" >> $GITHUB_OUTPUT
            echo "Picked issue #$FIRST"
          else
            echo "has_issue=false" >> $GITHUB_OUTPUT
            echo "No eligible issues found"
          fi

  run-agent:
    needs: fetch-issue
    if: needs.fetch-issue.outputs.has_issue == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ci-placeholder-not-a-real-key
    steps:
      - uses: actions/checkout@v6
        with:
          # PAT so the push of bender/<branch> fires DevCycle 2 — CI.
          # actions/checkout stores this token in .git/config, so subsequent
          # `git push` calls from the Claude session reuse the PAT automatically.
          token: ${{ secrets.GH_TRACKER_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Claude Code session for issue #${{ needs.fetch-issue.outputs.issue }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_PERSONAL }}
          # GH_TRACKER_TOKEN (PAT) for both git push and gh pr create so the
          # resulting PR triggers DevCycle 2 — CI (which then chains Review → Merge).
          GITHUB_TOKEN:            ${{ secrets.GH_TRACKER_TOKEN }}
          GH_TOKEN:                ${{ secrets.GH_TRACKER_TOKEN }}
        run: node .github/scripts/run-agent.js "${{ needs.fetch-issue.outputs.issue }}"

      - name: Clean up stale in-progress label on failure
        # Only runs if the Claude session timed out, crashed, or was cancelled.
        # On success, the session itself handles the outcome label; we just
        # reconcile residue via the next step.
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.fetch-issue.outputs.issue }}"
          echo "Non-success exit — cleaning up labels on #$ISSUE"
          gh api -X DELETE "repos/${{ github.repository }}/issues/$ISSUE/labels/agent:in-progress" || true
          gh api -X POST "repos/${{ github.repository }}/issues/$ISSUE/labels" \
            -f 'labels[]=agent:failed' || true

      - name: Reconcile labels on success
        # Remove residual bookkeeping labels (agent:in-progress always, and any
        # stale agent:failed from an earlier timed-out run). Leave whatever
        # outcome label the Claude session applied (agent:success, agent:partial,
        # agent:wrong-interpretation, etc.) untouched.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ needs.fetch-issue.outputs.issue }}"
          echo "Success exit — reconciling bookkeeping labels on #$ISSUE"
          gh api -X DELETE "repos/${{ github.repository }}/issues/$ISSUE/labels/agent:in-progress" || true
          gh api -X DELETE "repos/${{ github.repository }}/issues/$ISSUE/labels/agent:failed" || true

      - name: Log token usage
        if: always()
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/log-session-tokens.js --workflow "DevCycle 1 — Dev Agent" --issue "${{ needs.fetch-issue.outputs.issue }}"
