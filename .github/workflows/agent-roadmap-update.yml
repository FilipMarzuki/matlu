name: Weekly Roadmap Update

# Queries Linear for the week's shipped/opened/blocked issues, writes a
# progress log entry to the Notion Roadmap, and posts a dev blog entry.
# Runs every Monday — prompt lives in .agents/roadmap-update.md.

on:
  schedule:
    # 07:00 UTC every Monday.
    - cron: '0 7 * * 1'
  workflow_dispatch:

concurrency:
  group: agent-roadmap-update
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # agent commits last-roadmap-update.txt
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run roadmap update session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY:          ${{ secrets.LINEAR_API_KEY }}
          NOTION_API_KEY:          ${{ secrets.NOTION_API_KEY }}
          MATLU_WIKI_PUSH_TOKEN:   ${{ secrets.MATLU_WIKI_PUSH_TOKEN }}
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes @anthropic-ai/claude-code --print \
            --permission-mode bypassPermissions \
            "$(cat .agents/roadmap-update.md)"

      - name: Log token usage
        if: always()
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/log-session-tokens.js --workflow "Roadmap Update"
      # [token-logging-added]
